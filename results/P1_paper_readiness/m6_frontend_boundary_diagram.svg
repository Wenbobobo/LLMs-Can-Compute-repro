<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" fill="none"><rect x="0" y="0" width="1200" height="720" rx="0" fill="#ffffff" stroke="#ffffff" stroke-width="1"/><text x="40" y="46" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="bold" fill="#111827" text-anchor="start">M6 frontend boundary: tiny typed bytecode, not arbitrary C</text><text x="40" y="74" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="normal" fill="#374151" text-anchor="start">The first compiled step is a verifier-visible bytecode that lowers into the current exact exec_trace substrate. Wider compiled frontends stay blocked behind this boundary.</text><rect x="90" y="170" width="260" height="110" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/><text x="220" y="205" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="bold" fill="#111827" text-anchor="middle">Current exact substrate</text><text x="220" y="232" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="normal" fill="#111827" text-anchor="middle">append-only trace semantics</text><text x="220" y="254" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="normal" fill="#111827" text-anchor="middle">current exec_trace interpreter</text><text x="220" y="276" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="normal" fill="#111827" text-anchor="middle">no new VM in v1</text><rect x="455" y="120" width="290" height="170" rx="8" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/><text x="600" y="155" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="bold" fill="#111827" text-anchor="middle">Tiny typed bytecode v1</text><text x="600" y="184" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="normal" fill="#111827" text-anchor="middle">types: i32, addr, flag</text><text x="600" y="208" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="normal" fill="#111827" text-anchor="middle">ops: const, dup/pop, add/sub/eq</text><text x="600" y="232" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="normal" fill="#111827" text-anchor="middle">load/store static + indirect</text><text x="600" y="256" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="normal" fill="#111827" text-anchor="middle">jmp, jz_zero, static-target call/ret, halt</text><text x="600" y="280" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="normal" fill="#111827" text-anchor="middle">differentially checked against reference</text><rect x="455" y="340" width="290" height="120" rx="8" fill="#ecfeff" stroke="#67e8f9" stroke-width="1"/><text x="600" y="374" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="bold" fill="#111827" text-anchor="middle">Verifier + lowering</text><text x="600" y="402" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="normal" fill="#111827" text-anchor="middle">deterministic first-error reports</text><text x="600" y="426" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="normal" fill="#111827" text-anchor="middle">lower to current exec_trace program</text><rect x="850" y="170" width="260" height="160" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/><text x="980" y="204" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="bold" fill="#111827" text-anchor="middle">Current evidence</text><text x="980" y="232" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="normal" fill="#111827" text-anchor="middle">22 verifier-passing rows</text><text x="980" y="256" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="normal" fill="#111827" text-anchor="middle">16 short/medium exact-trace matches</text><text x="980" y="280" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="normal" fill="#111827" text-anchor="middle">6 long exact-final-state matches</text><text x="980" y="304" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="normal" fill="#111827" text-anchor="middle">22 paper-table rows in scope</text><rect x="850" y="420" width="260" height="120" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1" stroke-dasharray="8 6"/><text x="980" y="454" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="bold" fill="#111827" text-anchor="middle">Later compiled frontends</text><text x="980" y="482" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="normal" fill="#111827" text-anchor="middle">remain blocked until this tiny</text><text x="980" y="504" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="normal" fill="#111827" text-anchor="middle">typed-bytecode boundary widens safely</text><rect x="90" y="500" width="655" height="140" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/><text x="418" y="536" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="bold" fill="#111827" text-anchor="middle">Explicitly out of scope in v1</text><text x="418" y="566" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="normal" fill="#111827" text-anchor="middle">floating point  •  heap allocation  •  general recursion  •  locals</text><text x="418" y="592" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="normal" fill="#111827" text-anchor="middle">host effects/syscalls  •  concurrency  •  arbitrary C support</text><line x1="350" y1="225" x2="455" y2="205" stroke="#4b5563" stroke-width="2"/><line x1="447.2762312733978" y1="211.35164519301586" x2="455" y2="205" stroke="#4b5563" stroke-width="2"/><line x1="445.4821048113072" y1="201.93248126704034" x2="455" y2="205" stroke="#4b5563" stroke-width="2"/><line x1="600" y1="290" x2="600" y2="340" stroke="#4b5563" stroke-width="2"/><line x1="595.205744613958" y1="331.22417438109625" x2="600" y2="340" stroke="#4b5563" stroke-width="2"/><line x1="604.794255386042" y1="331.22417438109625" x2="600" y2="340" stroke="#4b5563" stroke-width="2"/><line x1="745" y1="225" x2="850" y2="225" stroke="#4b5563" stroke-width="2"/><line x1="841.2241743810963" y1="229.79425538604204" x2="850" y2="225" stroke="#4b5563" stroke-width="2"/><line x1="841.2241743810963" y1="220.20574461395796" x2="850" y2="225" stroke="#4b5563" stroke-width="2"/><line x1="745" y1="430" x2="850" y2="450" stroke="#4b5563" stroke-width="2" stroke-dasharray="8 6"/><line x1="840.4821048113072" y1="453.0675187329597" x2="850" y2="450" stroke="#4b5563" stroke-width="2"/><line x1="842.2762312733978" y1="443.6483548069842" x2="850" y2="450" stroke="#4b5563" stroke-width="2"/><line x1="600" y1="460" x2="350" y2="500" stroke="#4b5563" stroke-width="2"/><line x1="357.908159983847" y1="493.87946034488124" x2="350" y2="500" stroke="#4b5563" stroke-width="2"/><line x1="359.42305360559527" y1="503.34754548080804" x2="350" y2="500" stroke="#4b5563" stroke-width="2"/></svg>